<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overcast Realm — Hub de Gamedev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-base: #0b0b0d;
      --bg-card: #131317;
      --bg-card-hover: #191921;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-storm: #4f46e5;
      --accent-glow: #a5b4fc;
      --text-primary: #f3f4f6;
      --text-muted: #6b7280;
      --border-brutal: #2e2e3a;
    }

    * { 
      box-sizing: border-box; 
      border-radius: 0px !important; /* Força quebra de cantos redondos de IA */
    }

    /* TEXTURA TECNICA DE FUNDO (GRID + SCANLINES) */
    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      background-image: 
        linear-gradient(rgba(46, 46, 58, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 46, 58, 0.12) 1px, transparent 1px),
        linear-gradient(rgba(18, 18, 24, 0.4) 50%, rgba(0, 0, 0, 0.6) 50%);
      background-size: 24px 24px, 24px 24px, 100% 4px;
    }

    .font-pixel { font-family: 'Pixelify Sans', monospace; }

    /* CARDS BRUTALISTAS DE JOGO */
    .card {
      background: var(--bg-card);
      border: 2px solid var(--border-brutal);
      box-shadow: 4px 4px 0px #000000;
      transition: transform 0.05s, box-shadow 0.05s, border-color 0.05s;
    }
    .card:hover {
      border-color: var(--accent-glow);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px rgba(79, 70, 229, 0.4);
    }

    /* BOTÕES COM ATUAÇÃO DIGITAL SECA */
    .btn-primary {
      background: #000000;
      color: var(--accent-glow);
      border: 2px solid var(--accent-storm);
      box-shadow: 3px 3px 0px #000000;
      font-family: 'Pixelify Sans', monospace;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: var(--accent-storm);
      color: #ffffff;
      box-shadow: 1px 1px 0px #000000;
      transform: translate(2px, 2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 2px solid var(--border-brutal);
      box-shadow: 3px 3px 0px #000000;
      font-family: 'Pixelify Sans', monospace;
      padding: 8px 16px;
      cursor: pointer;
    }
    .btn-secondary:hover {
      border-color: var(--accent-glow);
      color: var(--text-primary);
    }

    /* NAV TABS */
    .nav-tab {
      font-family: 'Pixelify Sans', monospace;
      font-size: 14px;
      padding: 8px 14px;
      cursor: pointer;
      border: 2px solid transparent;
      color: var(--text-muted);
      background: transparent;
      white-space: nowrap;
    }
    .nav-tab:hover { 
      color: var(--text-primary); 
      border-bottom-color: var(--border-brutal);
    }
    .nav-tab.active {
      color: #ffffff;
      background: var(--bg-card);
      border: 2px solid var(--border-brutal);
      border-bottom-color: transparent;
      box-shadow: 2px -2px 0px #000000;
    }

    .section { display: none; }
    .section.active { display: block; }

    /* BARRA DE PROGRESSO RETRO PIXEL */
    .pixel-progress-track {
      background: #000000;
      border: 2px solid var(--border-brutal);
      height: 24px;
      position: relative;
    }
    .pixel-progress-fill {
      height: 100%;
      background: repeating-linear-gradient(
        -45deg,
        var(--accent-storm),
        var(--accent-storm) 8px,
        var(--accent-purple) 8px,
        var(--accent-purple) 16px
      );
    }
    .progress-step {
      font-family: 'Pixelify Sans', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
    .progress-step.done { color: var(--accent-glow); text-shadow: 0 0 4px var(--accent-storm); }

    /* JANELA MODAL DO JOGO */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      display: flex;
