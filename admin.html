<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overcast Realm — Terminal Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-base: #0a0a0c;
      --bg-card: #121216;
      --bg-input: #000000;
      --accent-storm: #4f46e5;
      --accent-glow: #a5b4fc;
      --accent-red: #ef4444;
      --accent-green: #10b981;
      --text-primary: #f3f4f6;
      --text-muted: #6b7280;
      --border-brutal: #2e2e3a;
    }

    * { 
      box-sizing: border-box; 
      border-radius: 0px !important;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      background-image: 
        linear-gradient(rgba(46, 46, 58, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 46, 58, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .font-pixel { 
      font-family: 'Press Start 2P', monospace; 
      line-height: 1.4;
    }

    .card {
      background: var(--bg-card);
      border: 2px solid var(--border-brutal);
      box-shadow: 4px 4px 0px #000000;
    }

    .input-field {
      background: var(--bg-input);
      border: 2px solid var(--border-brutal);
      color: var(--text-primary);
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }
    .input-field:focus {
      border-color: var(--accent-glow);
    }

    .select-field {
      background: #1c1c24;
      border: 2px solid var(--border-brutal);
      color: var(--text-primary);
      padding: 8px;
      font-size: 12px;
      outline: none;
    }

    .btn-action {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 2px 2px 0px #000000;
    }
    
    .btn-add { background: var(--accent-storm); color: #fff; }
    .btn-add:hover { background: #3730a3; }
    .btn-del { background: transparent; border-color: var(--accent-red); color: var(--accent-red); }
    .btn-del:hover { background: var(--accent-red); color: #fff; }
    .btn-edit { background: transparent; border-color: #eab308; color: #eab308; }
    .btn-edit:hover { background: #eab308; color: #000; }

    .nav-tab {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 12px 16px;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active {
      color: var(--accent-glow);
      border-bottom-color: var(--accent-storm);
    }

    .auth-input {
      background: #000000;
      border: 3px solid var(--border-brutal);
      color: var(--text-primary);
      padding: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      text-align: center;
      outline: none;
      width: 100%;
    }
    .auth-input:focus { border-color: var(--accent-storm); }
  </style>
</head>
<body class="p-4 md:p-8">

<div id="admin-auth-screen" class="fixed inset-0 bg-[#0a0a0c] z-[99999] flex items-center justify-center p-4">
  <div class="card p-6 w-full max-w-sm bg-[#121216] text-center">
    <p class="font-pixel text-[9px] text-red-400 mb-3">// TERMINAL_RAIZ_RESTRITO</p>
    <h2 class="font-pixel text-[11px] text-white mb-5">Autenticação do Administrador</h2>
    <input
      type="password"
      id="admin-password-input"
      class="auth-input mb-4"
      placeholder="CHAVE_MESTRA"
      onkeydown="if(event.key==='Enter') loginAdmin()"
    />
    <div id="auth-error" class="hidden font-pixel text-[8px] mb-4 text-red-500">[ACESSO_NEGADO: CHAVE_CORRUPTA]</div>
    <button class="btn-action btn-add w-full tracking-wider py-3 text-[10px]" onclick="loginAdmin()">DECODIFICAR_ACOMPANHAMENTO</button>
  </div>
</div>

<div id="admin-dashboard-content" class="hidden">
  <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b-2 border-[#2e2e3a] pb-4">
    <div>
      <h1 class="font-pixel text-sm text-white">[⚒ TERMINAL_MASTER_CONTROL]</h1>
      <p id="sync-status" class="text-xs font-mono mt-2 text-gray-500">Iniciando barramento...</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="btn-action bg-gray-800 text-white" onclick="exportData()">EXPORTAR_JSON</button>
      <button class="btn-action bg-red-950 text-red-400" onclick="resetStorage()">RESET_FACTORY</button>
      <button class="btn-action bg-zinc-900 text-zinc-400 border border-zinc-700" onclick="logoutAdmin()">LOGOUT_</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-5 space-y-6">
      <div class="card p-5">
        <h2 id="form-title" class="font-pixel text-[10px] text-indigo-400 mb-4">// REGISTRAR_ALUNO</h2>
        <div class="space-y-3 font-mono text-xs">
          <input type="hidden" id="edit-aluno-index" value="" />
          <div>
            <label class="block mb-1 text-gray-500">CÓDIGO DE ACESSO (EX: pablo01)</label>
            <input type="text" id="aluno-codigo" class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-gray-500">NOME DO ALUNO</label>
            <input type="text" id="aluno-nome" class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-gray-500">URL PASTA DE ENVIOS (.C3P)</label>
            <input type="text" id="aluno-envios" class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-gray-500">URL PASTA DE MATERIAIS</label>
            <input type="text" id="aluno-materiais" class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-gray-500">ESTÁGIO ATUAL DO PROJETO</label>
            <select id="aluno-etapa" class="input-field bg-black">
              <option value="Ideia">Ideia</option>
              <option value="Mecânica">Mecânica</option>
              <option value="Arte">Arte</option>
              <option value="Polimento">Polimento</option>
              <option value="Publicado">Publicado</option>
            </select>
          </div>
          <div class="pt-2 flex gap-2">
            <button class="btn-action btn-add flex-1" id="btn-save-aluno" onclick="saveAluno()">SALVAR_ALUNO</button>
            <button class="btn-action bg-gray-700 text-white hidden" id="btn-cancel-aluno" onclick="clearAlunoForm()">CANCELAR</button>
          </div>
        </div>
      </div>

      <div class="card p-4">
        <div class="flex border-b border-[#2e2e3a] mb-4">
          <button class="nav-tab active" id="tab-video" onclick="switchFormTab('video')">VÍDEOS</button>
          <button class="nav-tab" id="tab-link" onclick="switchFormTab('link')">LINKS</button>
          <button class="nav-tab" id="tab-jogo" onclick="switchFormTab('jogo')">JOGOS</button>
        </div>

        <div id="subform-video" class="space-y-3 font-mono text-xs">
          <input type="hidden" id="edit-video-index" value="" />
          <input type="text" id="video-titulo" placeholder="TÍTULO DA AULA" class="input-field" />
          <input type="text" id="video-url" placeholder="URL EMBED DO YOUTUBE" class="input-field" />
          <select id="video-categoria" class="input-field bg-black">
            <option value="Básico">Básico</option>
            <option value="Lógica">Lógica</option>
            <option value="Arte">Arte</option>
          </select>
          <button class="btn-action btn-add w-full" id="btn-save-video" onclick="saveVideo()">GRAVAR_VIDEO</button>
        </div>

        <div id="subform-link" class="space-y-3 font-mono text-xs hidden">
          <input type="hidden" id="edit-link-index" value="" />
          <input type="text" id="link-titulo" placeholder="TÍTULO DO RECURSO" class="input-field" />
          <input type="text" id="link-url" placeholder="URL" class="input-field" />
          <input type="text" id="link-descricao" placeholder="DESCRIÇÃO CURTA" class="input-field" />
          <input type="text" id="link-tag" placeholder="TAG (EX: ARTE, ASSETS)" class="input-field" />
          <button class="btn-action btn-add w-full" id="btn-save-link" onclick="saveLink()">GRAVAR_LINK</button>
        </div>

        <div id="subform-jogo" class="space-y-3 font-mono text-xs hidden">
          <input type="hidden" id="edit-jogo-index" value="" />
          <input type="text" id="jogo-titulo" placeholder="NOME DO JOGO" class="input-field" />
          <input type="text" id="jogo-autor" placeholder="AUTOR (ALUNO)" class="input-field" />
          <input type="text" id="jogo-capa" placeholder="URL DA IMAGEM DE CAPA" class="input-field" />
          <input type="text" id="jogo-url" placeholder="URL EMBED-UPLOAD DO ITCH.IO" class="input-field" />
          <textarea id="jogo-descricao" placeholder="DESCRIÇÃO DO CONTEXTO TÉCNICO" class="input-field h-20"></textarea>
          <input type="text" id="jogo-controles" placeholder="CONTROLES (EX: SETAS / ESPAÇO)" class="input-field" />
          <button class="btn-action btn-add w-full" id="btn-save-jogo" onclick="saveJogo()">GRAVAR_JOGO</button>
        </div>
      </div>
    </div>

    <div class="lg:col-span-7 space-y-6">
      <div class="card p-5">
        <h2 class="font-pixel text-[10px] text-emerald-400 mb-4">// BANCO_DE_DESENVOLVEDORES</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse font-mono text-xs">
            <thead>
              <tr class="border-b border-[#2e2e3a] text-gray-500">
                <th class="p-2">CÓDIGO</th>
                <th class="p-2">ALUNO</th>
                <th class="p-2">ESTÁGIO_PROJETO</th>
                <th class="p-2 text-right">AÇÕES</th>
              </tr>
            </thead>
            <tbody id="table-alunos-rows"></tbody>
          </table>
        </div>
      </div>

      <div class="card p-5">
        <h2 class="font-pixel text-[10px] text-emerald-400 mb-4">// ARQUIVO_DE_ELEMENTOS_EXTERNOS</h2>
        <div id="recursos-lista-container" class="space-y-3 font-mono text-xs max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </main>
</div>

<script>
// Chave de validação correspondente ao texto "overcast2026@"
const ADMIN_AUTH_KEY = "b3ZlcmNhc3QyMDI2QA==";
const STORAGE_KEY = 'overcast_v1_data';
let data = { alunos: [], videos: [], links: [], jogos: [] };

// ENGINE DE AUTENTICAÇÃO COM TRATAMENTO DE STRING LITERAL
function loginAdmin() {
  const input = document.getElementById('admin-password-input').value;
  
  // Converte de forma limpa sem quebrar a codificação de símbolos especiais
  const computedKey = btoa(unescape(encodeURIComponent(input)));

  if (computedKey === ADMIN_AUTH_KEY) {
    document.getElementById('auth-error').classList.add('hidden');
    sessionStorage.setItem('admin_session_token', 'AUTHORIZED_SUCCESS');
    unlockDashboard();
  } else {
    document.getElementById('auth-error').classList.remove('hidden');
  }
}

function checkPersistedSession() {
  const token = sessionStorage.getItem('admin_session_token');
  if (token === 'AUTHORIZED_SUCCESS') {
    unlockDashboard();
  }
}

function unlockDashboard() {
  document.getElementById('admin-auth-screen').classList.add('hidden');
  document.getElementById('admin-dashboard-content').classList.remove('hidden');
  loadFromStorage();
  renderAll();
}

function logoutAdmin() {
  sessionStorage.removeItem('admin_session_token');
  location.reload();
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      data = JSON.parse(saved);
      updateSyncStatus(true);
      return;
    }
  } catch(e) { console.error(e); }
  updateSyncStatus(false);
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    updateSyncStatus(true);
    renderAll();
  } catch(e) { alert("Erro ao sincronizar dados locais: " + e.message); }
}

function updateSyncStatus(active) {
  const el = document.getElementById('sync-status');
  if(active) {
    el.textContent = "● MÓDULO LOCAL SINCRONIZADO COM O INDEX.HTML";
    el.style.color = "#10b981";
  } else {
    el.textContent = "● ALERTA: BANCO DE DADOS VAZIO";
    el.style.color = "#ef4444";
  }
}

// ALUNOS ENGINE (INLINE EDIT INTEGRADO)
function renderAlunos() {
  const tbody = document.getElementById('table-alunos-rows');
  tbody.innerHTML = data.alunos.map((aluno, i) => `
    <tr class="border-b border-[#181822] hover:bg-[#111116]">
      <td class="p-2 text-indigo-400 font-bold">${aluno.codigo}</td>
      <td class="p-2 text-white">${aluno.nome}</td>
      <td class="p-2">
        <select class="select-field" onchange="updateEtapaInline(${i}, this.value)">
          <option value="Ideia" ${aluno.etapa==='Ideia'?'selected':''}>Ideia</option>
          <option value="Mecânica" ${aluno.etapa==='Mecânica'?'selected':''}>Mecânica</option>
          <option value="Arte" ${aluno.etapa==='Arte'?'selected':''}>Arte</option>
          <option value="Polimento" ${aluno.etapa==='Polimento'?'selected':''}>Polimento</option>
          <option value="Publicado" ${aluno.etapa==='Publicado'?'selected':''}>Publicado</option>
        </select>
      </td>
      <td class="p-2 text-right space-x-1">
        <button class="btn-action btn-edit" onclick="editAluno(${i})">EDIT</button>
        <button class="btn-action btn-del" onclick="deleteAluno(${i})">DEL</button>
      </td>
    </tr>
  `).join('');
}

function saveAluno() {
  const idx = document.getElementById('edit-aluno-index').value;
  const newAluno = {
    codigo: document.getElementById('aluno-codigo').value.trim().toLowerCase(),
    nome: document.getElementById('aluno-nome').value.trim(),
    pastaEnvios: document.getElementById('aluno-envios').value.trim(),
    pastaMateriais: document.getElementById('aluno-materiais').value.trim(),
    etapa: document.getElementById('aluno-etapa').value
  };

  if(!newAluno.codigo || !newAluno.nome) { alert("Campos essenciais vazios."); return; }

  if(idx !== "") {
    data.alunos[parseInt(idx)] = newAluno;
  } else {
    if(data.alunos.some(a => a.codigo === newAluno.codigo)) { alert("Este código já existe!"); return; }
    data.alunos.push(newAluno);
  }
  saveToStorage();
  clearAlunoForm();
}

function editAluno(i) {
  const aluno = data.alunos[i];
  document.getElementById('edit-aluno-index').value = i;
  document.getElementById('aluno-codigo').value = aluno.codigo;
  document.getElementById('aluno-nome').value = aluno.nome;
  document.getElementById('aluno-envios').value = aluno.pastaEnvios;
  document.getElementById('aluno-materiais').value = aluno.pastaMateriais;
  document.getElementById('aluno-etapa').value = aluno.etapa;
  
  document.getElementById('form-title').textContent = "// EDITAR_ALUNO_ID: #" + i;
  document.getElementById('btn-cancel-aluno').classList.remove('hidden');
}

function updateEtapaInline(i, novaEtapa) {
  data.alunos[i].etapa = novaEtapa;
  saveToStorage();
}

function deleteAluno(i) {
  if(confirm(`Remover definitivo: ${data.alunos[i].nome}?`)) {
    data.alunos.splice(i, 1);
    saveToStorage();
  }
}

function clearAlunoForm() {
  document.getElementById('edit-aluno-index').value = "";
  document.getElementById('aluno-codigo').value = "";
  document.getElementById('aluno-nome').value = "";
  document.getElementById('aluno-envios').value = "";
  document.getElementById('aluno-materiais').value = "";
  document.getElementById('form-title').textContent = "// REGISTRAR_ALUNO";
  document.getElementById('btn-cancel-aluno').classList.add('hidden');
}

// MULTI-FORM CONTROL
let activeSubForm = 'video';
function switchFormTab(formName) {
  activeSubForm = formName;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + formName).classList.add('active');
  
  document.getElementById('subform-video').classList.add('hidden');
  document.getElementById('subform-link').classList.add('hidden');
  document.getElementById('subform-jogo').classList.add('hidden');
  document.getElementById('subform-' + formName).classList.remove('hidden');
}

// SESSÃO VIDEOS
function saveVideo() {
  const idx = document.getElementById('edit-video-index').value;
  const v = {
    titulo: document.getElementById('video-titulo').value.trim(),
    url: document.getElementById('video-url').value.trim(),
    categoria: document.getElementById('video-categoria').value
  };
  if(!v.titulo || !v.url) return;
  if(idx !== "") data.videos[parseInt(idx)] = v; else data.videos.push(v);
  document.getElementById('edit-video-index').value = "";
  document.getElementById('video-titulo').value = "";
  document.getElementById('video-url').value = "";
  document.getElementById('btn-save-video').textContent = "GRAVAR_VIDEO";
  saveToStorage();
}

function editVideo(i) {
  switchFormTab('video');
  const v = data.videos[i];
  document.getElementById('edit-video-index').value = i;
  document.getElementById('video-titulo').value = v.titulo;
  document.getElementById('video-url').value = v.url;
  document.getElementById('video-categoria').value = v.categoria;
  document.getElementById('btn-save-video').textContent = "ATUALIZAR_VIDEO";
}

// SESSÃO LINKS
function saveLink() {
  const idx = document.getElementById('edit-link-index').value;
  const l = {
    titulo: document.getElementById('link-titulo').value.trim(),
    url: document.getElementById('link-url').value.trim(),
    descricao: document.getElementById('link-descricao').value.trim(),
    tag: document.getElementById('link-tag').value.trim()
  };
  if(!l.titulo || !l.url) return;
  if(idx !== "") data.links[parseInt(idx)] = l; else data.links.push(l);
  document.getElementById('edit-link-index').value = "";
  document.getElementById('link-titulo').value = "";
  document.getElementById('link-url').value = "";
  document.getElementById('link-descricao').value = "";
  document.getElementById('link-tag').value = "";
  document.getElementById('btn-save-link').textContent = "GRAVAR_LINK";
  saveToStorage();
}

function editLink(i) {
  switchFormTab('link');
  const l = data.links[i];
  document.getElementById('edit-link-index').value = i;
  document.getElementById('link-titulo').value = l.titulo;
  document.getElementById('link-url').value = l.url;
  document.getElementById('link-descricao').value = l.descricao;
  document.getElementById('link-tag').value = l.tag;
  document.getElementById('btn-save-link').textContent = "ATUALIZAR_LINK";
}

// SESSÃO JOGOS
function saveJogo() {
  const idx = document.getElementById('edit-jogo-index').value;
  const j = {
    titulo: document.getElementById('jogo-titulo').value.trim(),
    autor: document.getElementById('jogo-autor').value.trim(),
    capa: document.getElementById('jogo-capa').value.trim(),
    url: document.getElementById('jogo-url').value.trim(),
    descricao: document.getElementById('jogo-descricao').value.trim(),
    controles: document.getElementById('jogo-controles').value.trim()
  };
  if(!j.titulo || !j.url) return;
  if(idx !== "") data.jogos[parseInt(idx)] = j; else data.jogos.push(j);
  document.getElementById('edit-jogo-index').value = "";
  document.getElementById('jogo-titulo').value = "";
  document.getElementById('jogo-autor').value = "";
  document.getElementById('jogo-capa').value = "";
  document.getElementById('jogo-url').value = "";
  document.getElementById('jogo-descricao').value = "";
  document.getElementById('jogo-controles').value = "";
  document.getElementById('btn-save-jogo').textContent = "GRAVAR_JOGO";
  saveToStorage();
}

function editJogo(i) {
  switchFormTab('jogo');
  const j = data.jogos[i];
  document.getElementById('edit-jogo-index').value = i;
  document.getElementById('jogo-titulo').value = j.titulo;
  document.getElementById('jogo-autor').value = j.autor;
  document.getElementById('jogo-capa').value = j.capa;
  document.getElementById('jogo-url').value = j.url;
  document.getElementById('jogo-descricao').value = j.descricao;
  document.getElementById('jogo-controles').value = j.controles;
  document.getElementById('btn-save-jogo').textContent = "ATUALIZAR_JOGO";
}

function deleteRecurso(tipo, i) {
  if(confirm(`Remover este item do tipo [${tipo.toUpperCase()}]?`)) {
    data[tipo].splice(i, 1);
    saveToStorage();
  }
}

function renderRecursos() {
  const container = document.getElementById('recursos-lista-container');
  let html = '';

  data.videos.forEach((v, i) => {
    html += `<div class="p-2 border border-blue-900 bg-[#0c0c10] flex justify-between items-center">
      <div><span class="text-blue-400">[VÍDEO]</span> ${v.titulo} (${v.categoria})</div>
      <div class="space-x-1"><button class="btn-action btn-edit" onclick="editVideo(${i})">EDIT</button><button class="btn-action btn-del" onclick="deleteRecurso('videos', ${i})">X</button></div>
    </div>`;
  });

  data.links.forEach((l, i) => {
    html += `<div class="p-2 border border-purple-900 bg-[#0c0c10] flex justify-between items-center">
      <div><span class="text-purple-400">[LINK]</span> ${l.titulo} [${l.tag}]</div>
      <div class="space-x-1"><button class="btn-action btn-edit" onclick="editLink(${i})">EDIT</button><button class="btn-action btn-del" onclick="deleteRecurso('links', ${i})">X</button></div>
    </div>`;
  });

  data.jogos.forEach((j, i) => {
    html += `<div class="p-2 border border-yellow-900 bg-[#0c0c10] flex justify-between items-center">
      <div><span class="text-yellow-500">[JOGO]</span> ${j.titulo} (Por: ${j.autor})</div>
      <div class="space-x-1"><button class="btn-action btn-edit" onclick="editJogo(${i})">EDIT</button><button class="btn-action btn-del" onclick="deleteRecurso('jogos', ${i})">X</button></div>
    </div>`;
  });

  container.innerHTML = html || '<p class="text-gray-600 font-pixel text-[8px] p-4">NENHUM RECURSO ADICIONADO.</p>';
}

function renderAll() {
  renderAlunos();
  renderRecursos();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type : 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'overcast_backup.json';
  a.click();
}

function resetStorage() {
  if(!confirm('Deseja limpar todos os registros locais do navegador?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

document.addEventListener('DOMContentLoaded', () => {
  checkPersistedSession();
});
</script>
</body>
